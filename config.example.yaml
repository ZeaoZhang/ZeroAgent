llm_backends:
  default:
    provider: openai
    api_key: "your_api_key_here"
    api_base: "https://api.deepseek.com"
    model: "deepseek-v4-flash"
    max_tokens: 8192
    temperature: 1.0

max_turns: 80
verbose: true
language: "zh"
workspace_dir: "./workspace"
memory_dir: "./memory"
sessions_dir: "./workspace/sessions"
