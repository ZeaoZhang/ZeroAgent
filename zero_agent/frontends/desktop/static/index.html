<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZeroAgent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Left Drawer: Session Management -->
    <aside id="left-drawer" class="drawer left-drawer">
      <div class="drawer-header">
        <h2>Sessions</h2>
        <button id="new-session-btn" class="icon-btn" title="New chat" aria-label="New chat">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>
      <div class="drawer-content">
        <div id="session-list" class="session-list"></div>
      </div>
      <div class="drawer-footer" id="model-status" role="button" tabindex="0" title="Click to change model">
        <div class="model-info">
          <span id="current-model">Loading...</span>
        </div>
        <div class="token-info">
          <span id="token-usage">0 / 0</span>
        </div>
      </div>
      <button id="toggle-left-drawer" class="drawer-toggle left" title="Toggle sidebar (⌘B)" aria-label="Toggle left sidebar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </aside>

    <!-- Main area -->
    <main id="main">
      <header id="topbar">
        <div class="topbar-left">
          <button id="toggle-left-drawer-alt" class="icon-btn" title="Toggle sessions" aria-label="Toggle sessions sidebar">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
          </button>
          <h1 id="session-title">ZeroAgent</h1>
        </div>
        <div class="topbar-right">
          <span id="status-badge" class="badge">
            <span class="status-dot"></span>
            <span id="status-text">Starting…</span>
          </span>
          <button id="theme-toggle-btn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/>
            </svg>
          </button>
          <button id="toggle-right-drawer-alt" class="icon-btn" title="Toggle agents" aria-label="Toggle agents sidebar">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v6m0 6v6M5.6 5.6l4.2 4.2m4.4 4.4l4.2 4.2M1 12h6m6 0h6M5.6 18.4l4.2-4.2m4.4-4.4l4.2-4.2"/>
            </svg>
          </button>
        </div>
      </header>

      <div id="search-bar" class="search-bar hidden">
        <input id="search-input" type="text" placeholder="Search messages…" aria-label="Search messages">
        <span id="search-count" class="search-count"></span>
        <button id="search-prev" class="search-nav-btn" title="Previous (Shift+Enter)" aria-label="Previous match">▲</button>
        <button id="search-next" class="search-nav-btn" title="Next (Enter)" aria-label="Next match">▼</button>
        <button id="search-close" class="search-nav-btn" title="Close (Escape)" aria-label="Close search">✕</button>
      </div>

      <section id="messages" class="empty">
        <div class="empty-state">
          <div class="empty-title">New task</div>
          <div class="empty-sub">Task me anything. Type <code>/help</code> for commands.</div>
        </div>
      </section>

      <div id="composer-wrap">
        <div id="command-palette" class="command-palette hidden" role="listbox" aria-label="Command suggestions"></div>
        <div id="composer">
          <div id="image-previews" class="image-previews"></div>
          <textarea id="input" rows="1" placeholder="Type a message, or /help"></textarea>
          <div class="composer-bottom">
            <button id="send-btn" class="send-btn" title="Send (Enter)">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M13 6l6 6-6 6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Right Drawer: Agent Control Panel -->
    <aside id="right-drawer" class="drawer right-drawer collapsed">
      <div class="drawer-header">
        <h2>Active Agents</h2>
        <button id="close-right-drawer" class="icon-btn" title="Close" aria-label="Close agents panel">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="drawer-content">
        <div id="agent-list" class="agent-list">
          <div class="empty-state-small">
            <span>No active agents</span>
          </div>
        </div>
      </div>
      <button id="toggle-right-drawer" class="drawer-toggle right" title="Toggle agents (⌘⌥B)" aria-label="Toggle right sidebar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </aside>

    <!-- Model Picker Modal -->
    <div id="model-picker-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Select Model</h3>
          <button class="icon-btn" id="close-model-picker">✕</button>
        </div>
        <div class="modal-body">
          <div id="model-list" class="model-list"></div>
        </div>
      </div>
    </div>

    <!-- Error banner -->
    <div id="error-banner" class="error-banner hidden">
      <span id="error-text"></span>
      <button class="icon-btn ghost" id="error-action"></button>
      <button class="icon-btn ghost" id="error-dismiss">✕</button>
    </div>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="za-web.js?v=za-slash-1"></script>
  <script src="app.js?v=za-slash-1"></script>
</body>
</html>
