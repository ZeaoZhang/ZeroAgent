<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZeroAgent</title>
  <link rel="stylesheet" href="styles.css?v=app-sidebar-1">
</head>
<body>
  <div id="app">
    <aside id="sidebar" aria-label="Workspace">
      <div class="sidebar-brand">
        <div class="sidebar-kicker">ZEROAGENT</div>
        <div id="sidebar-active-title" class="sidebar-title" data-ui="app-name">ZeroAgent</div>
      </div>

      <button id="sidebar-new-btn" class="sidebar-primary" type="button">New chat</button>

      <section class="sidebar-section" aria-labelledby="sidebar-sessions-title">
        <div id="sidebar-sessions-title" class="sidebar-section-title">Sessions</div>
        <div id="sidebar-session-list" class="sidebar-session-list"></div>
      </section>

      <section class="sidebar-section sidebar-settings" aria-labelledby="sidebar-settings-title">
        <div id="sidebar-settings-title" class="sidebar-heading">Settings</div>
        <div class="sidebar-model-card">
          <span>Model</span>
          <strong id="sidebar-model">Default / Auto</strong>
        </div>
        <button id="sidebar-settings-btn" class="sidebar-action" type="button">Settings</button>
        <button id="sidebar-stop-btn" class="sidebar-action" type="button">Force Stop</button>
        <button id="sidebar-tools-btn" class="sidebar-action" type="button">Reinject Tools</button>
      </section>

      <div class="sidebar-footer" aria-live="polite">
        <span id="sidebar-status" class="sidebar-status">Starting...</span>
      </div>
    </aside>

    <!-- Main area -->
    <main id="main">
      <header id="topbar">
        <div class="topbar-left">
          <div id="session-list" class="tab-strip" role="tablist" aria-label="Chats">
            <button id="new-session-btn" class="tab-new-btn" title="New chat" aria-label="New chat">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="topbar-right">
          <h1 id="session-title" class="sr-only" data-ui="app-name">ZeroAgent</h1>
          <span id="status-badge" class="badge">
            <span class="status-dot"></span>
            <span id="status-text">Starting...</span>
          </span>
        </div>
      </header>

      <div id="search-bar" class="search-bar hidden">
        <input id="search-input" type="text" placeholder="Search messages..." aria-label="Search messages">
        <span id="search-count" class="search-count"></span>
        <button id="search-prev" class="search-nav-btn" title="Previous (Shift+Enter)" aria-label="Previous match">↑</button>
        <button id="search-next" class="search-nav-btn" title="Next (Enter)" aria-label="Next match">↓</button>
        <button id="search-close" class="search-nav-btn" title="Close (Escape)" aria-label="Close search">×</button>
      </div>

      <section id="messages" class="empty">
        <div class="empty-state">
          <div class="empty-panel empty-copy">
            <div class="empty-brand" data-ui="app-name">ZeroAgent</div>
            <div class="empty-title" data-ui="welcome-title">Ready</div>
            <div class="empty-sub" data-ui="welcome-subtitle">No active run</div>
          </div>
          <div class="empty-panel empty-visual" aria-hidden="true">
            <div class="empty-scanline"></div>
            <div class="empty-frame">
              <span></span><span></span><span></span>
            </div>
          </div>
          <div class="empty-panel empty-status" aria-hidden="true">
            <div class="empty-status-row"><span></span><strong></strong></div>
            <div class="empty-status-row"><span></span><strong></strong></div>
            <div class="empty-status-row"><span></span><strong></strong></div>
          </div>
        </div>
      </section>

      <div id="composer-wrap">
        <div id="composer">
          <div id="image-previews" class="image-previews"></div>
          <textarea id="input" rows="1" placeholder="Ask ZeroAgent to work on something" data-ui="chat-placeholder"></textarea>
          <div id="command-palette" class="command-palette hidden" role="listbox" aria-label="Command suggestions"></div>
          <div class="composer-bottom">
            <div class="composer-hints">
              <button id="settings-btn" class="icon-btn ghost" title="Settings" aria-label="Settings">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </button>
            </div>
            <button id="send-btn" class="send-btn" title="Send (Enter)">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M5 12h14M13 6l6 6-6 6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Settings modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-body">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="icon-btn ghost" id="close-settings" aria-label="Close settings">×</button>
        </div>
        <div class="modal-content">
          <div class="form-row">
            <label for="cfg-llm">Model</label>
            <select id="cfg-llm">
              <option value="0">Default / Auto</option>
            </select>
            <small>Select a backend from the active ZeroAgent config.</small>
          </div>
          <div class="form-row">
            <label>API keys</label>
            <div class="btn-row">
              <button class="btn" id="open-mykey">Open config</button>
            </div>
            <small>Configure API keys in <code>config.yaml</code> or environment variables.</small>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn ghost" id="cancel-settings">Cancel</button>
          <button class="btn primary" id="save-settings">Save</button>
        </div>
      </div>
    </div>



    <!-- Error banner -->
    <div id="error-banner" class="error-banner hidden">
      <span id="error-text"></span>
      <button class="icon-btn ghost" id="error-action"></button>
      <button class="icon-btn ghost" id="error-dismiss" aria-label="Dismiss error">×</button>
    </div>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="ga-web.js?v=bridge-port-1"></script>
  <script src="app.js?v=app-sidebar-1"></script>
</body>
</html>
